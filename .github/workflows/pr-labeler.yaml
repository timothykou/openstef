# Automatically label PRs, config in ../pr-labeler.yml
name: PR Labeler
on:
  pull_request_target:
    types: [opened]

jobs:
  pr-labeler:
    permissions:
      contents: read # To read config file
      pull-requests: write # To add labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/pr-labeler.yml
