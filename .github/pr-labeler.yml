# config of action in ./workflows/...
feature:
  - head-branch:
      - "^feature.*"
      - "^feat.*"
fix:
  - head-branch:
      - "^fix.*"
      - "^bugfix.*"
      - "^hotfix.*"
      - "^bug.*"
chore:
  - head-branch:
      - "^chore.*"
      - "^doc.*"
